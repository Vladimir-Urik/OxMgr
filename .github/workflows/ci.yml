name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Node.js
        if: runner.os == 'Linux'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cargo fmt check
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --all-targets

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Validate download metrics script
        if: runner.os == 'Linux'
        run: python3 -m py_compile scripts/generate_download_metrics.py

      - name: Packaging smoke checks
        if: runner.os == 'Linux'
        run: bash scripts/smoke_packaging.sh

      - name: Cargo test
        run: cargo test --all-targets

  e2e:
    name: E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo e2e tests (Unix)
        if: runner.os != 'Windows'
        env:
          OXMGR_RUN_E2E: "1"
        run: cargo test --test e2e_cli -- --nocapture

      - name: Cargo e2e tests (Windows)
        if: runner.os == 'Windows'
        env:
          OXMGR_RUN_E2E: "1"
        run: cargo test --test e2e_cli -- --nocapture --test-threads=1
